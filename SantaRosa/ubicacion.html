<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubicación - IE Santa Rosa</title>
    <style>
        /* ===================================================
           1. ESTILOS GLOBALES Y RESETEO
           =================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #fff5f6; /* Fondo con matiz sutil rosado de tu plantilla */
            color: #1e293b;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border-radius: 8px;
        }
        h1 {
            color: #111111;
            font-size: 1.8rem;
            border-left: 5px solid #ffb6c1;
            padding-left: 12px;
            font-weight: 700;
        }
        hr {
            border: 0;
            border-top: 1px solid #f0e2e4;
            margin: 20px 0;
        }

        /* ===================================================
           2. BARRA DE NAVEGACIÓN CAPTURADA (ESTILO EXACTO)
           =================================================== */
        header {
            background-color: #031b33; /* Azul marino/negro muy profundo según tu captura */
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 4px solid #ffb6c1; /* Línea de acento rosa */
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* Envoltura del enlace del logo: Ahora es un bloque interactivo completo */
        .brand-link {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            cursor: pointer;
        }
        .brand-logo {
            width: 45px;  
            height: 45px;
            object-fit: contain;
        }
        .brand-text {
            display: flex;
            flex-direction: column;
        }
        .brand-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff; /* Blanco */
            letter-spacing: 0.5px;
        }
        .brand-subtitle {
            font-size: 0.75rem;
            color: #ffb6c1; /* Tono rosa suave/coral de la captura */
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-bottom: 2px solid #ffb6c1; /* Línea decorativa del enlace */
            padding-bottom: 4px;
            transition: all 0.2s ease;
        }
        nav a:hover {
            color: #ffb6c1;
        }

           3. ELEMENTOS DE CONTENIDO DE UBICACIÓN
           =================================================== */
        .info-ubicacion {

            line-height: 1.6;
            background-color: #fff9fa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #f0e2e4;
        }
