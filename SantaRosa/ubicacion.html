<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubicación - IE Santa Rosa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        header {
            background-color: #003366;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-container img {
            height: 60px;
            cursor: pointer;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        h1 {
            color: #003366;
        }
        .map-responsive {
            overflow: hidden;
            padding-bottom: 56.25%;
            position: relative;
            height: 0;
            margin-top: 20px;
        }
        .map-responsive iframe {
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            position: absolute;
            border: 0;
        }
        .info-ubicacion {
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="../index.html">
                <img src="../IMG/logo.png" alt="Logo Santa Rosa">
            </a>
        </div>
        <nav>
            <a href="../index.html">Inicio</a>
            <a href="ubicacion.html" style="text-decoration: underline;">Ubicación</a>
        </nav>
    </header>

    <div class="container">
        <h1>Nuestra Ubicación</h1>
        <hr>
        
        <div class="info-ubicacion">
            <p><strong>Dirección:</strong> Distrito de Huarmey, Ancash, Perú.</p>
            <p><strong>Referencia:</strong> Institución Educativa Santa Rosa.</p>
        </div>

        <div style="text-align: center; margin: 20px 0;">
            <img src="../IMG/fachada.jpg" alt="Fachada Institución Educativa" style="max-width: 100%; height: auto; border-radius: 4px;">
        </div>

        <div class="map-responsive">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3923.6738374246835!2d-78.151245!3d-10.068345!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTDCsDA0JzA2LjAiUyA3OMKwMDknMDQuNSJX!5e0!3m2!1ses-419!2spe!4v1700000000000!5m2!1ses-419!2spe" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </div>

</body>
</html>
